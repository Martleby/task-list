<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/sort@3.x.x/dist/cdn.min.js"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Task List</title>
</head>
<body class="h-dvh w-full flex justify-center p-8">

    <div x-data="{

        tasks: $persist([
            
        ]),

        addTask(text){

            if(text.trim().length == 0){
                return;
            }

            let id = this.tasks.length ? Math.max(...this.tasks.map(t => t.id)) + 1 : 1

            let task = {
                id: id,
                name: text,
                complete: false
            }

            this.tasks.push(task)
            this.$refs.taskInput.value = ''
        },
        
        deleteTask(task){
            this.tasks = this.tasks.filter(t => t.id != task.id)
        },

        handleUpdate(item, position){
            const task = this.tasks.find(t => t.id == item);
            const oldIndex = this.tasks.indexOf(task);
        
            // Move the item in the array
            this.tasks.splice(oldIndex, 1);
            this.tasks.splice(position, 0, task);
        }

    }">

        <div class="text-xl bg-zinc-50 p-4 flex flex-col gap-y-8 w-lg">

            <h1 class="text-5xl place-self-start">Task list</h1>

            <ul x-sort="handleUpdate($item, $position)">
            <template x-for="task in tasks" :key="task.id">

                <li 
                    x-data="{editing: false}"
                    x-sort:item="task.id" class="grid grid-cols-[1fr_auto] gap-x-2 w-full">
                    <div class="relative">
                        <div class="absolute w-full line-clamp-1 overflow-hidden text-ellipsis grow-1 cursor-grab active:cursor-grabbing" 
                            :class="task.complete ? 'line-through' : ''" 
                            x-text="task.name"
                            x-sort:handle>
                        </div>
                        <div x-show="editing" class="absolute z-10 w-full bg-white flex gap-x-2">
                            <input @keyup.enter="editing = false"
                                class="w-full border-0" 
                                x-model="task.name" 
                                type="text"
                                @edit.window="if($event.detail.id == task.id) $el.focus()">
                            <button @click="editing = false;">✔</button>
                        </div>
                    </div>
                    <div class="flex gap-x-4">
                        <input class="w-full" type="checkbox" x-model="task.complete">
                        <button @click="editing = true; $nextTick(() => $dispatch('edit', {id: task.id}))">✏</button>
                        <button @click="deleteTask(task)">❌</button>
                    </div>
                </li>

            </template>
        </ul>

            <div class="flex gap-x-2 w-full">
                <input class="border rounded bg-white w-full px-1" x-ref="taskInput" type="text"
                        placeholder="Task name..."
                       @keyup.enter="addTask($refs.taskInput.value)">
                <button class="shrink-0 text-sm border bg-zinc-100 hover:bg-zinc-200 p-1" 
                        @click="addTask($refs.taskInput.value)">Add task</button>
            </div>


        </div>

    </div>
    
</body>
</html>
